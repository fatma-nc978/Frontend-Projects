<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Döviz Kuru</title>

            </div>
            <div class="hr">

                <br>
            </div>
            <div>

                    <input id="amount" type="number" placeholder="Miktar" />

                        <option>RON</option>
                        <option>SEK</option>
                        <option>CHF</option>
                        <option>ISF</option>
                        <option>NOK</option>
                        <option>HRK</option>
                        <option>RUB</option>
                        <option>TRY</option>
                        <option>AUD</option>
                        <option>BRL</option>
                        <option>CAD</option>
                        <option>CNY</option>
                        <option>HKD</option>
                        <option>IDR</option>
                        <option>ILS</option>
                        <option>INR</option>
                        <option>KRW</option>
                        <option>MXN</option>
                        <option>MYR</option>
                        <option>NZD</option>
                        <option>PHP</option>
                        <option>SGD</option>
                        <option>THB</option>
                        <option>ZAR</option>
                    </select>
                    <span>➜</span>
                    <select name="" id="secondCurrencyOption">
                        <option>USD</option>
                        <option>EUR</option>
                        <option>JPY</option>
                        <option>BGN</option>
                        <option>CZK</option>
                        <option>DKK</option>
                        <option>HUF</option>
                        <option>PLN</option>
                        <option>RON</option>
                        <option>SEK</option>
                        <option>CHF</option>
                        <option>ISF</option>
                        <option>NOK</option>
                        <option>HRK</option>
                        <option>RUB</option>
                        <option selected>TRY</option>
                        <option>AUD</option>
                        <option>BRL</option>
                        <option>CAD</option>
                        <option>CNY</option>
                        <option>HKD</option>
                        <option>IDR</option>
                        <option>ILS</option>
                        <option>INR</option>
                        <option>KRW</option>
                        <option>MXN</option>
                        <option>MYR</option>
                        <option>NZD</option>
                        <option>PHP</option>
                        <option>SGD</option>
                        <option>THB</option>
                        <option>ZAR</option>
                    </select>
                    <input type="number" id="result" placeholder="Sonuç" readonly />
                    <button onclick="" id="run">⇆</button>
                </form>
            </div>
        </div>
    </div>


    <script src="currency.js"></script>
    <script src="main.js"></script>

</body>

</html>
