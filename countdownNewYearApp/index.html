<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown NewYear</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h3>Countdown To New Year</h3>
        </div>
        <div class="year">2027</div>
        <div class="countdown">
            <div class="days">
                <span id="daysSpan">00</span>
                <span class="span">Days</span>
            </div>
            <div class="hours">
                <span id="hoursSpan">00</span>
                <span class="span">Hours</span>
            </div>
            <div class="minutes">
                <span id="minutesSpan">00</span>
                <span class="span">Minutes</span>
            </div>
            <div class="seconds">
                <span id="secondsSpan">00</span>
                <span class="span">Seconds</span>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
